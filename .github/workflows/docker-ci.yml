name: CloudIt CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker-validation:
    name: Docker CI Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker image
        run: docker compose build

      - name: Start application
        run: docker compose up -d

      - name: Wait for application
        run: sleep 10

      - name: Show container status
        run: docker compose ps

      - name: Test application
        run: curl --fail http://localhost

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Clean up CI environment
        if: always()
        run: docker compose down

  build-and-push-ecr:
    name: Build and Push Image to ECR
    runs-on: ubuntu-latest
    needs: docker-validation

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: CloudItGitHubActions
          allowed-account-ids: "832569408670"

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs:
      - docker-validation
      - build-and-push-ecr

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy CloudIt to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" << 'EOF'
            set -e

            cd /home/ubuntu/cloudit

            echo "Fetching latest CloudIt code..."
            git fetch origin
            git reset --hard origin/main

            echo "Logging in to Amazon ECR..."
            aws ecr get-login-password --region ap-southeast-2 | \
              docker login \
                --username AWS \
                --password-stdin \
                832569408670.dkr.ecr.ap-southeast-2.amazonaws.com

            export ECR_IMAGE="832569408670.dkr.ecr.ap-southeast-2.amazonaws.com/cloudit-app:latest"

            echo "Pulling latest image from Amazon ECR..."
            docker compose \
              -f compose.yaml \
              -f compose.ec2.yaml \
              pull

            echo "Deploying CloudIt from Amazon ECR..."
            docker compose \
              -f compose.yaml \
              -f compose.ec2.yaml \
              up -d --remove-orphans

            echo "Checking container status..."
            docker compose \
              -f compose.yaml \
              -f compose.ec2.yaml \
              ps

            echo "Testing CloudIt inside EC2..."
            curl --fail \
              --retry 10 \
              --retry-delay 3 \
              http://localhost:8081

            echo "CloudIt deployment completed successfully."
          EOF

      - name: Verify public deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          curl --fail \
            --retry 10 \
            --retry-delay 3 \
            "http://$EC2_HOST:8081"